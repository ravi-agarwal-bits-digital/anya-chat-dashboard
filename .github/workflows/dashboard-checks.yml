name: Dashboard checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dashboard-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run dashboard smoke checks
        run: node tests/dashboard-smoke.test.js
